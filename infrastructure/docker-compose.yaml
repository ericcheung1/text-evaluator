services:
  wp-dot-com:
    image: ghcr.io/ericcheung1/wp-dot-com:main
    expose:
      - "8000"
    env_file: .env
    restart: unless-stopped

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - wp-dot-com

volumes:
  caddy_data:
  caddy_config: