name: Deploy Nginx as Gateway

on:
  push:
    branches: [ "main" ]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout nginx config and docker compose
        uses: actions/checkout@v4

      - name: Copy config and compose to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'infrastructure/'
          target: '~/wp-dot-com'
          strip_components: 1
      
      - name: executing remote ssh commands using password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/wp-dot-com
            docker compose pull nginx certbot
            docker compose up -d --remove-orphans nginx certbot

            if [ ! -d "./certbot/conf/live/word-processor-dot-com.site" ]; then
                echo "No certs found — issuing initial certificate..."

                docker compose run --rm certbot certonly \
                    --webroot -w /var/www/certbot \
                    -d word-processor-dot-com.site \
                    -d www.word-processor-dot-com.site \
                    --email ericcheun251@gmail.com \
                    --agree-tos \
                    --non-interactive

                docker compose kill -s HUP nginx
            else
                echo "Certs already exist — skipping issuance."
            fi